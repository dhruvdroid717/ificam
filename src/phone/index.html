<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>iFicam Capture</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand">
          <span class="logo-shell"><img src="/favicon.png" alt="" /></span>
          <span>
            <strong>iFicam</strong>
            <small>@ungyani</small>
          </span>
        </div>
        <div class="status" id="status"><span class="dot" id="dot"></span><span id="statusText">Tap start to connect</span></div>
      </header>

      <div class="stage" id="stage">
        <video id="preview" autoplay muted playsinline></video>
        <div class="focus-ring hidden" id="focusRing"></div>
        <div class="overlay" id="overlay">
          <div class="hero-mark"><img src="/favicon.png" alt="" /></div>
          <p class="eyebrow">Wireless Phone Camera</p>
          <h1>Ready when your PC is.</h1>
          <p>Allow camera and microphone to stream live. Recording stays on your computer, never on this phone.</p>
        </div>
      </div>

      <div class="phone-controls hidden" id="phoneControls">
        <div class="row">
          <button id="recordBtn" class="record">
            <span class="record-dot"></span>
            <span class="record-label">Start recording</span>
            <span id="recordTimer" class="record-timer hidden">00:00</span>
          </button>
          <button id="flipBtn" class="secondary" aria-label="Flip camera"><span class="button-icon">Flip</span></button>
        </div>
        <div class="zoom-row" id="zoomRow">
          <button class="zoom" data-zoom="0.5">0.5x</button>
          <button class="zoom active" data-zoom="1">1x</button>
          <button class="zoom" data-zoom="2">2x</button>
          <button class="zoom" data-zoom="3">3x</button>
        </div>
      </div>

      <div class="dock">
        <label class="pinfield" id="pinField">
          <span>Pairing PIN</span>
          <input id="pinInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="0000" autocomplete="one-time-code" />
        </label>
        <button id="startBtn" class="primary">Start streaming</button>
        <a id="certLink" href="/ificam-cert.crt">Trust certificate</a>
      </div>
    </main>
    <script src="/main.js" defer></script>
  </body>
</html>
