name: Release iFicam

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: npm run build:all -- --publish never

      - name: Prepare update metadata
        run: npm run prepare:release-assets

      - name: Publish release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          $tag = $env:GITHUB_REF_NAME

          gh release view $tag 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title $version --notes "iFicam $version" --latest
          } else {
            gh release create $tag --title $version --notes "iFicam $version" --latest
          }

          gh release upload $tag `
            "release/iFicam-Setup-$version.exe" `
            "release/iFicam-Setup-$version.exe.blockmap" `
            "release/latest.yml" `
            --clobber
