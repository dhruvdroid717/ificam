name: Release iFicam

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:all -- --publish always

      - name: Keep release assets tidy
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          $tag = $env:GITHUB_REF_NAME
          $assetsToRemove = @(
            "iFicam-Setup-$version-x64.exe",
            "iFicam-Setup-$version-x64.exe.blockmap",
            "iFicam-Setup-$version-ia32.exe",
            "iFicam-Setup-$version-ia32.exe.blockmap"
          )

          foreach ($asset in $assetsToRemove) {
            gh release delete-asset $tag $asset --yes 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Asset not present or already removed: $asset"
            }
          }
